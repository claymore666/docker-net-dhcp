name: Integration

# Live integration tests against the plugin. Run on the self-hosted
# `dhcp-ci` runners: they need privileges (CAP_NET_ADMIN, mount/netns
# ops, bind UDP/67) and a real DHCP server (dnsmasq). Those work on a
# GitHub-hosted VM too (full root via sudo) — the reason this lane is
# self-hosted is control and parity: a purpose-built image pinning the
# toolchain and Docker Engine >=28, pooled for parallelism, gives a
# stable per-PR gate. A stock hosted runner is exercised separately and
# non-gating by integration-hosted.yml (#238) as a portability check.
#
# The `dhcp-ci` runners are ephemeral: one container = one job, each
# with its own nested Docker daemon (image ghcr.io/claymore666/
# dhcp-ci-runner, Docker Engine >= 28). An orchestrator pools 2-4 of
# them (names dhcp-ci-<n>), so jobs run in PARALLEL and in full
# isolation — replacing the single serial bare-metal runner.
#
# SECURITY: this workflow runs as root inside the runner container.
# Repo Settings → Actions → General → "Fork pull request workflows
# from outside collaborators" is set to "Require approval for all
# outside collaborators" so external PRs sit in pending until manually
# approved.
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

# No concurrency group (intentional — do not re-add). The gpu1-era
# `selfhosted-docker` group serialized jobs because they shared one
# bare-metal Docker daemon (the :integration / :golang-cover plugin
# refs, the dnsmasq fixture's fixed veth names + UDP/67). Each
# `dhcp-ci` job now runs in its own ephemeral container with an
# isolated nested daemon, so those collisions can't happen — parallel
# jobs are safe, and serializing them would throw away the whole point
# of the move.

permissions:
  contents: read

jobs:
  integration:
    runs-on: [self-hosted, dhcp-ci]
    # 35 = main suite (~10 min here, 558s measured on runner-class
    # hardware, #146) + failure-injection suite (~10 min of mostly
    # deliberate DHCP-timing waits, #128) + plugin build + margin.
    timeout-minutes: 35
    env:
      INTEGRATION_PLUGIN_REF: ghcr.io/claymore666/docker-net-dhcp:integration
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      # The Go toolchain (go.mod's version) is baked into the dhcp-ci
      # runner image, so actions/setup-go is skipped. Fail loudly if
      # it's ever missing — that means the runner image drifted from
      # go.mod and needs a rebuild (ci/runner-image/).
      - name: Verify Go toolchain
        run: |
          if ! command -v go >/dev/null; then
            echo "go not in PATH — dhcp-ci runner image is stale vs go.mod; rebuild ci/runner-image/"
            exit 1
          fi
          go version

      # Best-effort: clean any orphans from a previous run that
      # panicked mid-setup. Safe to run even on a clean state.
      - name: Cleanup orphans from previous runs
        run: bash test/integration/cleanup-orphans.sh

      # Build + install the plugin from THIS PR's source tree, tagged
      # `:integration` so it coexists with `:golang` (production) and
      # `:golang-cover` (coverage workflow). Replaces the pre-v0.9.0
      # behaviour of testing against a manually-installed `:golang`
      # — that approach silently skipped validation for any PR that
      # modified plugin code (new driver-opts, RPC shape changes,
      # etc.), since the production plugin pre-dated the change.
      #
      # ~60s rebuild cost per run is the right trade for "every PR
      # tests its own plugin code". Same shape as coverage.yml's
      # plugin-cover step, just without the -cover instrumentation.
      - name: Build + install integration plugin
        run: |
          make PLUGIN_NAME=ghcr.io/claymore666/docker-net-dhcp PLUGIN_TAG=integration plugin
          docker plugin rm -f "${INTEGRATION_PLUGIN_REF}" 2>/dev/null || true
          docker plugin create "${INTEGRATION_PLUGIN_REF}" plugin
          docker plugin set "${INTEGRATION_PLUGIN_REF}" LOG_LEVEL=trace
          docker plugin enable "${INTEGRATION_PLUGIN_REF}"

      - name: Run integration tests
        run: make integration-test

      # Failure-injection suite (#128): server loss, NAK on renewal,
      # lease expiry — each against a per-test ephemeral DHCP server.
      # Separate step so a red here is immediately distinguishable
      # from a main-suite regression.
      - name: Run failure-injection tests
        run: make integration-test-failure

      # Tear down so a follow-up workflow on the same runner doesn't
      # find a stale `:integration` plugin pinned to the previous
      # PR's source. Always-run; failure of the test step shouldn't
      # leave global state behind.
      - name: Tear down integration plugin
        if: always()
        run: |
          docker plugin disable "${INTEGRATION_PLUGIN_REF}" 2>/dev/null || true
          docker plugin rm -f "${INTEGRATION_PLUGIN_REF}" 2>/dev/null || true
