name: Integration

# Live integration tests against the plugin. Run on the self-hosted
# `gpu1` runner because they need privileges (CAP_NET_ADMIN, mount/
# netns ops, bind UDP/67) and a real DHCP server (dnsmasq) — neither
# is feasible on free GitHub-hosted runners.
#
# SECURITY: this workflow runs as root on the maintainer's hardware.
# Repo Settings → Actions → General → "Fork pull request workflows
# from outside collaborators" is set to "Require approval for all
# outside collaborators" so external PRs sit in pending until manually
# approved.
on:
  push:
    branches:
      - main
      - dev
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  integration:
    runs-on: [self-hosted, gpu1]
    timeout-minutes: 20
    env:
      INTEGRATION_PLUGIN_REF: ghcr.io/claymore666/docker-net-dhcp:integration
    steps:
      - uses: actions/checkout@v4

      # The Go toolchain is pre-installed on the runner via
      # test/integration/install-go-runner.sh (one-time operator
      # action). Skipping actions/setup-go saves ~30s per run on
      # this runner since the version in go.mod (1.25) doesn't ship
      # in apt anyway. If go is missing, fail loudly so the runner
      # operator sees the install step they need to run.
      - name: Verify Go toolchain
        run: |
          if ! command -v go >/dev/null; then
            echo "go not in PATH on this runner."
            echo "Run: sudo bash test/integration/install-go-runner.sh"
            exit 1
          fi
          go version

      # Best-effort: clean any orphans from a previous run that
      # panicked mid-setup. Safe to run even on a clean state.
      - name: Cleanup orphans from previous runs
        run: bash test/integration/cleanup-orphans.sh

      # Build + install the plugin from THIS PR's source tree, tagged
      # `:integration` so it coexists with `:golang` (production) and
      # `:golang-cover` (coverage workflow). Replaces the pre-v0.9.0
      # behaviour of testing against a manually-installed `:golang`
      # — that approach silently skipped validation for any PR that
      # modified plugin code (new driver-opts, RPC shape changes,
      # etc.), since the production plugin pre-dated the change.
      #
      # ~60s rebuild cost per run is the right trade for "every PR
      # tests its own plugin code". Same shape as coverage.yml's
      # plugin-cover step, just without the -cover instrumentation.
      - name: Build + install integration plugin
        run: |
          make PLUGIN_NAME=ghcr.io/claymore666/docker-net-dhcp PLUGIN_TAG=integration plugin
          docker plugin rm -f "${INTEGRATION_PLUGIN_REF}" 2>/dev/null || true
          docker plugin create "${INTEGRATION_PLUGIN_REF}" plugin
          docker plugin set "${INTEGRATION_PLUGIN_REF}" LOG_LEVEL=trace
          docker plugin enable "${INTEGRATION_PLUGIN_REF}"

      - name: Run integration tests
        run: make integration-test

      # Tear down so a follow-up workflow on the same runner doesn't
      # find a stale `:integration` plugin pinned to the previous
      # PR's source. Always-run; failure of the test step shouldn't
      # leave global state behind.
      - name: Tear down integration plugin
        if: always()
        run: |
          docker plugin disable "${INTEGRATION_PLUGIN_REF}" 2>/dev/null || true
          docker plugin rm -f "${INTEGRATION_PLUGIN_REF}" 2>/dev/null || true
