name: Dependency review

# Block PRs that introduce a new vulnerable or disallowed-license
# dependency, at PR time — the gap Dependabot leaves (it alerts after a
# dep is already merged). Scans the dependency diff of the PR only.
#
# Hosted-runner job (zero load on the integration runner). Runs on PRs
# into the integration branches; nothing to do on direct pushes.
on:
  pull_request:
    branches:
      - main
      - dev

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Posture (fail-on-severity: high) and the allow-ghsas list of
          # known-unreachable daemon-side docker/docker advisories live in
          # the config file — the advisory-level counterpart of
          # .github/vuln-allowlist.txt (#193). Keep accepted findings
          # there with justification + review date, not inline here.
          config-file: ./.github/dependency-review-config.yml
