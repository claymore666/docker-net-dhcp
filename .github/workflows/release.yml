name: Release

# Build and publish the plugin image on a vX.Y.Z tag push. Pushes to
# GHCR (always — built-in token) and Docker Hub (when the credentials
# secrets are configured). Dual-pushing keeps every release reachable
# from both registries; the README points operators at GHCR but Docker
# Hub is where most plugin discovery still happens.
#
# Trigger shapes:
#   - `git tag v0.8.0 && git push --tags` → automatic
#   - `git tag v1.0.0-rc1 && git push --tags` → automatic, pre-release
#     mode: full chain runs but `:latest` is NOT moved — the zero-impact
#     end-to-end dry-run to do before every real release tag
#   - GitHub UI → "Run workflow" → enter tag → manual re-run of an
#     existing tag (NOTE: a bare vX.Y.Z here rebuilds and re-points
#     that tag AND `:latest` — prefer the rc-tag dry-run)
#
# Required secrets (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME — Docker Hub login (e.g. `claymore666`)
#   - DOCKERHUB_TOKEN    — Docker Hub access token (NOT password)
# If absent, the Hub step skips with a warning instead of failing.
#
# Maintainer post-release checklist (this workflow does not handle it):
#   1. Fast-forward dev to main so the release commit lands on dev too:
#        git checkout dev && git merge --ff-only main && git push origin dev
#      Otherwise the next feature branched from dev starts at the
#      previous version's README/docs and the next release PR has to
#      re-bump them. Forgotten once after v0.9.0.
#   2. Verify GHCR (and Docker Hub, if configured) shows the new tag.
#   3. If a production host runs the plugin, plan the upgrade as a
#      separate change — this workflow only publishes the image.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.8.0). Must already exist on the remote."
        required: true

permissions:
  contents: read
  packages: write   # GHCR push needs this on GITHUB_TOKEN

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    outputs:
      tag: ${{ steps.tag.outputs.tag }}

    env:
      # GHCR is always pushed. Hub repo only pushed when secrets are set.
      # Hub uses the shorter `net-dhcp` name (matching upstream's
      # convention there); GHCR keeps `docker-net-dhcp` to align with
      # the existing tag history.
      GHCR_NAME: ghcr.io/claymore666/docker-net-dhcp
      HUB_NAME: claymore666/net-dhcp
      # Materialize the Docker Hub secrets-presence check at job level
      # so steps can gate on env (allowed) rather than on the secrets
      # context directly (rejected at parse time inside step-level
      # `if:` expressions). Resolves to the literal string "true" or
      # "false" — compare with `== 'true'` downstream.
      HAS_HUB_CREDS: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Tag $TAG does not look like vX.Y.Z; refusing." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Pre-release guard: a suffixed tag (vX.Y.Z-rc1 etc.) runs the
          # full publishing chain — build, dual-registry push of the rc
          # tag, description sync, verify-install — but must NOT move
          # `:latest` or overwrite any bare release tag. This makes rc
          # tags a zero-impact end-to-end dry-run of this workflow
          # before the real vX.Y.Z tag (see docs/release-runbook.md).
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Releasing tag: $TAG"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Pre-release tag: $TAG — :latest will not be moved"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          # Full history so RELEASE_NOTES.md credits / "since vX" greps
          # behave the same as on a developer checkout.
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        id: hub-login
        if: env.HAS_HUB_CREDS == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Warn if Docker Hub credentials missing
        if: env.HAS_HUB_CREDS != 'true'
        run: |
          echo "::warning::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets not set — skipping Docker Hub push. GHCR push proceeds normally."

      # Push to GHCR. `make push` chains create → push, so the plugin
      # is built fresh and published with the resolved tag. The Make
      # default PLUGIN_NAME already points at GHCR — passing it
      # explicitly here keeps the workflow self-documenting.
      #
      # Each registry gets two pushes: the version tag AND `:latest`,
      # so consumers can pin (`:v0.8.0`) or just track tip (`:latest`).
      # docker plugin doesn't support tag aliasing the way regular
      # images do — every tag is a separate push of the same rootfs.
      # The Make `create` target rebuilds only the plugin handle, not
      # the underlying rootfs image, so the second push is fast.
      # `:latest` is guarded: pre-release tags never move it (and would
      # otherwise also let a dispatch of an OLD tag silently regress
      # what `:latest` points at — only bare vX.Y.Z tags may move it).
      - name: Push to GHCR
        run: make PLUGIN_NAME="${GHCR_NAME}" PLUGIN_TAG="${{ steps.tag.outputs.tag }}" push

      - name: Push :latest to GHCR
        if: steps.tag.outputs.prerelease != 'true'
        run: make PLUGIN_NAME="${GHCR_NAME}" PLUGIN_TAG="latest" push

      # Same plugin to Docker Hub when credentials are present. Make
      # rebuilds the rootfs with the Hub-prefixed name; the underlying
      # Docker image layer cache is reused so this is cheap.
      - name: Push to Docker Hub
        if: env.HAS_HUB_CREDS == 'true'
        run: make PLUGIN_NAME="${HUB_NAME}" PLUGIN_TAG="${{ steps.tag.outputs.tag }}" push

      - name: Push :latest to Docker Hub
        if: env.HAS_HUB_CREDS == 'true' && steps.tag.outputs.prerelease != 'true'
        run: make PLUGIN_NAME="${HUB_NAME}" PLUGIN_TAG="latest" push

      # Refresh the Docker Hub long description from the repo's README
      # so the Hub page never drifts from what's on GitHub. Short
      # description is owned here too — change it in this file when you
      # want it to change. Idempotent: the action diffs and only PATCHes
      # when content changed. Skipped if Hub credentials aren't set.
      #
      # Auth note: DOCKERHUB_TOKEN must be a Personal Access Token with
      # Read & Write scope on this repo (not just Read & Write image
      # push) — Docker Hub gates description-update behind admin scope.
      # If this step 401s, regenerate the token; image-push tokens
      # alone won't do.
      - name: Sync Docker Hub description from README
        if: env.HAS_HUB_CREDS == 'true'
        uses: peter-evans/dockerhub-description@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.HUB_NAME }}
          short-description: "DHCP-leased IPs for Docker containers (bridge/macvlan/ipvlan). Fork of devplayer0/docker-net-dhcp."
          readme-filepath: ./README.md

      # Convenience: print the install incantations operators will use,
      # straight into the workflow summary so the release page links
      # them prominently.
      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Released ${{ steps.tag.outputs.tag }}"
            echo
            if [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
              echo "**Pre-release dry-run** — \`:latest\` was not moved."
            else
              echo "Each registry receives both \`:${{ steps.tag.outputs.tag }}\` (pin) and \`:latest\` (tip)."
            fi
            echo
            echo "### Install from GHCR"
            echo '```'
            echo "docker plugin install ${GHCR_NAME}:${{ steps.tag.outputs.tag }}"
            echo "docker plugin install ${GHCR_NAME}:latest"
            echo '```'
            if [ "${HAS_HUB_CREDS}" = "true" ]; then
              echo "### Install from Docker Hub"
              echo '```'
              echo "docker plugin install ${HUB_NAME}:${{ steps.tag.outputs.tag }}"
              echo "docker plugin install ${HUB_NAME}:latest"
              echo '```'
            else
              echo "_Docker Hub push skipped — set DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets to enable._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # Post-publish verification: install the artifact users will actually
  # pull, from a clean GitHub-hosted runner. "We pushed bytes" is not
  # "the deliverable works" — a plugin that 500s on install or fails to
  # enable must turn the release run red, not surface in a user issue
  # (#127). Exercised before each real release by the runbook's
  # workflow_dispatch dry-run against the previous tag.
  verify-install:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GHCR_NAME: ghcr.io/claymore666/docker-net-dhcp
    steps:
      - name: Install released plugin from GHCR
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          REF="${GHCR_NAME}:${TAG}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker plugin install --grant-all-permissions "$REF"
          docker plugin ls

      - name: Assert plugin is enabled
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          REF="${GHCR_NAME}:${TAG}"
          ENABLED="$(docker plugin inspect -f '{{.Enabled}}' "$REF")"
          if [ "$ENABLED" != "true" ]; then
            echo "Plugin installed but not enabled (Enabled=$ENABLED)"
            docker plugin inspect "$REF"
            exit 1
          fi
          echo "Plugin ${REF} installs and enables cleanly." >> "$GITHUB_STEP_SUMMARY"
