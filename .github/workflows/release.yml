name: Release

# Build and publish the plugin image on a vX.Y.Z tag push. Pushes to
# GHCR (always — built-in token) and Docker Hub (when the credentials
# secrets are configured). Dual-pushing keeps every release reachable
# from both registries; the README points operators at GHCR but Docker
# Hub is where most plugin discovery still happens.
#
# Trigger shapes:
#   - `git tag v0.8.0 && git push --tags` → automatic
#   - `git tag v1.0.0-rc1 && git push --tags` → automatic, pre-release
#     mode: full chain runs but `:latest` is NOT moved — the zero-impact
#     end-to-end dry-run to do before every real release tag
#   - GitHub UI → "Run workflow" → enter tag → manual re-run of an
#     existing tag (NOTE: a bare vX.Y.Z here rebuilds and re-points
#     that tag AND `:latest` — prefer the rc-tag dry-run)
#
# Required secrets (Settings → Secrets and variables → Actions):
#   - DOCKERHUB_USERNAME — Docker Hub login (e.g. `claymore666`)
#   - DOCKERHUB_TOKEN    — Docker Hub access token (NOT password)
# If absent, the Hub step skips with a warning instead of failing.
#
# Maintainer post-release checklist (this workflow does not handle it):
#   1. Fast-forward dev to main so the release commit lands on dev too:
#        git checkout dev && git merge --ff-only main && git push origin dev
#      Otherwise the next feature branched from dev starts at the
#      previous version's README/docs and the next release PR has to
#      re-bump them. Forgotten once after v0.9.0.
#   2. Verify GHCR (and Docker Hub, if configured) shows the new tag.
#   3. If a production host runs the plugin, plan the upgrade as a
#      separate change — this workflow only publishes the image.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.8.0). Must already exist on the remote."
        required: true

# Top-level token is read-only; write scopes are granted per-job below
# (Scorecard Token-Permissions: a workflow-wide write scope leaks into
# every job, including ones that only need to pull).
permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write       # GHCR push + image-signature/attestation upload
      id-token: write       # keyless cosign signing + provenance (OIDC)
      attestations: write   # actions/attest-build-provenance attestations

    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      prerelease: ${{ steps.tag.outputs.prerelease }}

    env:
      # GHCR is always pushed. Hub repo only pushed when secrets are set.
      # Hub uses the shorter `net-dhcp` name (matching upstream's
      # convention there); GHCR keeps `docker-net-dhcp` to align with
      # the existing tag history.
      GHCR_NAME: ghcr.io/claymore666/docker-net-dhcp
      HUB_NAME: claymore666/net-dhcp
      # Materialize the Docker Hub secrets-presence check at job level
      # so steps can gate on env (allowed) rather than on the secrets
      # context directly (rejected at parse time inside step-level
      # `if:` expressions). Resolves to the literal string "true" or
      # "false" — compare with `== 'true'` downstream.
      HAS_HUB_CREDS: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ inputs.tag }}" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "Tag $TAG does not look like vX.Y.Z; refusing." >&2
            exit 1
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          # Pre-release guard: a suffixed tag (vX.Y.Z-rc1 etc.) runs the
          # full publishing chain — build, dual-registry push of the rc
          # tag, description sync, verify-install — but must NOT move
          # `:latest` or overwrite any bare release tag. This makes rc
          # tags a zero-impact end-to-end dry-run of this workflow
          # before the real vX.Y.Z tag (see docs/release-runbook.md).
          if [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "Releasing tag: $TAG"
          else
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "Pre-release tag: $TAG — :latest will not be moved"
          fi

      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ steps.tag.outputs.tag }}
          # Full history so RELEASE_NOTES.md credits / "since vX" greps
          # behave the same as on a developer checkout.
          fetch-depth: 0

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod

      - name: Log in to GHCR
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        id: hub-login
        if: env.HAS_HUB_CREDS == 'true'
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Warn if Docker Hub credentials missing
        if: env.HAS_HUB_CREDS != 'true'
        run: |
          echo "::warning::DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets not set — skipping Docker Hub push. GHCR push proceeds normally."

      # Push to GHCR. `make push` chains create → push, so the plugin
      # is built fresh and published with the resolved tag. The Make
      # default PLUGIN_NAME already points at GHCR — passing it
      # explicitly here keeps the workflow self-documenting.
      #
      # Each registry gets two pushes: the version tag AND `:latest`,
      # so consumers can pin (`:v0.8.0`) or just track tip (`:latest`).
      # docker plugin doesn't support tag aliasing the way regular
      # images do — every tag is a separate push of the same rootfs.
      # The Make `create` target rebuilds only the plugin handle, not
      # the underlying rootfs image, so the second push is fast.
      # `:latest` is guarded: pre-release tags never move it (and would
      # otherwise also let a dispatch of an OLD tag silently regress
      # what `:latest` points at — only bare vX.Y.Z tags may move it).
      - name: Push to GHCR
        run: make PLUGIN_NAME="${GHCR_NAME}" PLUGIN_TAG="${{ steps.tag.outputs.tag }}" push

      - name: Push :latest to GHCR
        if: steps.tag.outputs.prerelease != 'true'
        run: make PLUGIN_NAME="${GHCR_NAME}" PLUGIN_TAG="latest" push

      # Same plugin to Docker Hub when credentials are present. Make
      # rebuilds the rootfs with the Hub-prefixed name; the underlying
      # Docker image layer cache is reused so this is cheap.
      - name: Push to Docker Hub
        if: env.HAS_HUB_CREDS == 'true'
        run: make PLUGIN_NAME="${HUB_NAME}" PLUGIN_TAG="${{ steps.tag.outputs.tag }}" push

      - name: Push :latest to Docker Hub
        if: env.HAS_HUB_CREDS == 'true' && steps.tag.outputs.prerelease != 'true'
        run: make PLUGIN_NAME="${HUB_NAME}" PLUGIN_TAG="latest" push

      # Refresh the Docker Hub long description from the repo's README
      # so the Hub page never drifts from what's on GitHub. Short
      # description is owned here too — change it in this file when you
      # want it to change. Idempotent: the action diffs and only PATCHes
      # when content changed. Skipped if Hub credentials aren't set.
      #
      # Auth note: DOCKERHUB_TOKEN must be a Personal Access Token with
      # Read & Write scope on this repo (not just Read & Write image
      # push) — Docker Hub gates description-update behind admin scope.
      # If this step 401s/403s, regenerate the token; image-push tokens
      # alone won't do.
      #
      # continue-on-error: the long description is auxiliary metadata —
      # the published plugin (both registries) is what users pull, and
      # the runbook already treats the whole Hub path as optional
      # (GHCR alone still publishes). A description-sync auth failure
      # (e.g. a rotated / under-scoped token) must NOT fail the release
      # job or block verify-install; it surfaces as a red step to fix
      # out-of-band and re-syncs on the next release once the token is
      # restored. v1.0.0-rc1 caught exactly this: Hub 403 on PATCH.
      - name: Sync Docker Hub description from README
        if: env.HAS_HUB_CREDS == 'true'
        continue-on-error: true
        uses: peter-evans/dockerhub-description@1b9a80c056b620d92cedb9d9b5a223409c68ddfa # v5
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
          repository: ${{ env.HUB_NAME }}
          short-description: "DHCP-leased IPs for Docker containers (bridge/macvlan/ipvlan). Fork of devplayer0/docker-net-dhcp."
          readme-filepath: ./README.md

      # Sign a release artifact and hand it to the github-release job.
      # Scorecard's Signed-Releases check inspects artifacts attached to
      # the GitHub Release — signing the registry images alone does not
      # satisfy it (#163). `make push` above already built plugin/
      # (rootfs + config.json), the exact tree `docker plugin create`
      # consumed, so packaging that reconstructs the published plugin.
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      # Sign the published plugin images by digest (#173). docker plugins
      # are OCI artifacts, so cosign signs them like any image once we
      # resolve the registry manifest digest — `docker buildx imagetools
      # inspect` reads it despite the plugin media type. :latest and the
      # version tag share one digest, so one signature per registry covers
      # both. The GHCR digest is exported for the provenance step below.
      - name: Sign published images (cosign keyless)
        id: signimg
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          GHCR_DIGEST=$(docker buildx imagetools inspect "${GHCR_NAME}:${TAG}" --format '{{.Manifest.Digest}}')
          echo "ghcr_digest=${GHCR_DIGEST}" >> "$GITHUB_OUTPUT"
          cosign sign --yes "${GHCR_NAME}@${GHCR_DIGEST}"
          echo "Signed ${GHCR_NAME}@${GHCR_DIGEST}"
          if [ "${HAS_HUB_CREDS}" = "true" ]; then
            HUB_DIGEST=$(docker buildx imagetools inspect "${HUB_NAME}:${TAG}" --format '{{.Manifest.Digest}}')
            cosign sign --yes "${HUB_NAME}@${HUB_DIGEST}"
            echo "Signed ${HUB_NAME}@${HUB_DIGEST}"
          fi

      # SBOM over the plugin rootfs make already built (#174). syft emits
      # SPDX and CycloneDX in one pass; both are attached to the release
      # and folded into the signed checksum manifest below.
      - name: Install syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Generate SBOM (SPDX + CycloneDX)
        run: |
          set -euo pipefail
          syft scan dir:plugin/rootfs \
            -o "spdx-json=sbom.spdx.json" \
            -o "cyclonedx-json=sbom.cdx.json"
          ls -l sbom.spdx.json sbom.cdx.json

      - name: Package and sign release artifact
        env:
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          ART="net-dhcp-plugin-${TAG}-linux-amd64.tar.gz"
          tar -czf "$ART" -C plugin .
          # Manifest covers the tarball AND the SBOMs, so the single
          # keyless signature below attests all release assets at once.
          sha256sum "$ART" sbom.spdx.json sbom.cdx.json > checksums.txt
          # Keyless (Fulcio/OIDC) signature over the checksum manifest.
          # Emits a detached signature and the short-lived signing
          # certificate; both are public and verified against the Actions
          # OIDC issuer.
          cosign sign-blob --yes \
            --output-signature checksums.txt.sig \
            --output-certificate checksums.txt.pem \
            "checksums.txt"
          echo "Signed release artifacts:"
          cat checksums.txt

      # SLSA build provenance (#173): GitHub-native attestations that bind
      # each artifact to this workflow + commit, verifiable with
      # `gh attestation verify`. One call for the file artifacts (by path)
      # and one for the published GHCR image (by digest, pushed to the
      # registry alongside the image).
      - name: Attest release-artifact provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            net-dhcp-plugin-*.tar.gz
            sbom.spdx.json
            sbom.cdx.json

      - name: Attest image provenance (GHCR)
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-name: ${{ env.GHCR_NAME }}
          subject-digest: ${{ steps.signimg.outputs.ghcr_digest }}
          push-to-registry: true

      - name: Upload signed artifacts for the release job
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: signed-release
          path: |
            net-dhcp-plugin-*.tar.gz
            sbom.spdx.json
            sbom.cdx.json
            checksums.txt
            checksums.txt.sig
            checksums.txt.pem
          retention-days: 7
          if-no-files-found: error

      # Convenience: print the install incantations operators will use,
      # straight into the workflow summary so the release page links
      # them prominently.
      - name: Workflow summary
        if: always()
        run: |
          {
            echo "## Released ${{ steps.tag.outputs.tag }}"
            echo
            if [ "${{ steps.tag.outputs.prerelease }}" = "true" ]; then
              echo "**Pre-release dry-run** — \`:latest\` was not moved."
            else
              echo "Each registry receives both \`:${{ steps.tag.outputs.tag }}\` (pin) and \`:latest\` (tip)."
            fi
            echo
            echo "### Install from GHCR"
            echo '```'
            echo "docker plugin install ${GHCR_NAME}:${{ steps.tag.outputs.tag }}"
            echo "docker plugin install ${GHCR_NAME}:latest"
            echo '```'
            if [ "${HAS_HUB_CREDS}" = "true" ]; then
              echo "### Install from Docker Hub"
              echo '```'
              echo "docker plugin install ${HUB_NAME}:${{ steps.tag.outputs.tag }}"
              echo "docker plugin install ${HUB_NAME}:latest"
              echo '```'
            else
              echo "_Docker Hub push skipped — set DOCKERHUB_USERNAME / DOCKERHUB_TOKEN secrets to enable._"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

  # Post-publish verification: install the artifact users will actually
  # pull, from a clean GitHub-hosted runner. "We pushed bytes" is not
  # "the deliverable works" — a plugin that 500s on install or fails to
  # enable must turn the release run red, not surface in a user issue
  # (#127). Exercised before each real release by the runbook's
  # workflow_dispatch dry-run against the previous tag.
  verify-install:
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      packages: read   # pulls the just-published plugin from GHCR
    env:
      GHCR_NAME: ghcr.io/claymore666/docker-net-dhcp
    steps:
      - name: Install released plugin from GHCR
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          REF="${GHCR_NAME}:${TAG}"
          echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
          docker plugin install --grant-all-permissions "$REF"
          docker plugin ls

      - name: Assert plugin is enabled
        run: |
          TAG="${{ needs.release.outputs.tag }}"
          REF="${GHCR_NAME}:${TAG}"
          ENABLED="$(docker plugin inspect -f '{{.Enabled}}' "$REF")"
          if [ "$ENABLED" != "true" ]; then
            echo "Plugin installed but not enabled (Enabled=$ENABLED)"
            docker plugin inspect "$REF"
            exit 1
          fi
          echo "Plugin ${REF} installs and enables cleanly." >> "$GITHUB_STEP_SUMMARY"

  # Cut the GitHub Release with the signed artifacts attached. Gated on
  # verify-install so a plugin that doesn't install/enable never gets an
  # advertised Releases page pointing users at it — the same ordering
  # the runbook's manual step 9 followed (cut the release only after the
  # workflow, incl. verify-install, is green). Satisfies Scorecard
  # Signed-Releases: every tag (incl. rc dry-runs) produces a Release
  # carrying the cosign-signed checksum manifest (#163).
  github-release:
    needs: [release, verify-install]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write   # create the GitHub Release and upload assets
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG: ${{ needs.release.outputs.tag }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          ref: ${{ needs.release.outputs.tag }}
          fetch-depth: 0

      - name: Download signed artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131 # v7.0.0
        with:
          name: signed-release

      - name: Assemble release notes
        run: |
          set -euo pipefail
          # Per-version section from RELEASE_NOTES.md (the extraction the
          # runbook documents). Exact-match the header so version dots
          # aren't treated as regex. Empty for rc/suffixed tags that have
          # no notes section — fall back to a short body so the dry-run
          # still produces a release.
          awk -v hdr="## ${TAG}" '$0==hdr{flag=1; next} /^## v/{flag=0} flag' \
            RELEASE_NOTES.md > notes.md || true
          if [ ! -s notes.md ]; then
            echo "Pre-release / dry-run build for \`${TAG}\`." > notes.md
          fi
          # Append cosign verification instructions for the signed manifest.
          # Heredoc (not a wall of single-quoted echos) so the literal
          # backslash line-continuations don't trip shellcheck SC1003 in
          # the actionlint gate (#183). Quoted 'EOF' -> emitted verbatim.
          cat >> notes.md <<'EOF'

          ## Verifying the signed artifacts

          The `checksums.txt` manifest is signed keylessly with cosign (Sigstore); one signature covers every attached artifact. Verify the manifest, then check the artifacts against it:

          ```sh
          cosign verify-blob \
            --certificate checksums.txt.pem \
            --signature checksums.txt.sig \
            --certificate-identity-regexp '^https://github.com/claymore666/docker-net-dhcp/.github/workflows/release.yml@' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            checksums.txt
          sha256sum -c checksums.txt
          ```

          The published plugin image is signed (cosign keyless) and carries SLSA build provenance, and an SBOM is attached (`sbom.spdx.json`, `sbom.cdx.json`):

          ```sh
          # image signature
          cosign verify ghcr.io/claymore666/docker-net-dhcp:VERSION \
            --certificate-identity-regexp '^https://github.com/claymore666/docker-net-dhcp/.github/workflows/release.yml@' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com
          # build provenance (image + release artifacts)
          gh attestation verify oci://ghcr.io/claymore666/docker-net-dhcp:VERSION --repo claymore666/docker-net-dhcp
          gh attestation verify net-dhcp-plugin-VERSION-linux-amd64.tar.gz --repo claymore666/docker-net-dhcp
          ```
          EOF

      - name: Create or update the GitHub Release with signed artifacts
        run: |
          set -euo pipefail
          if [ "${{ needs.release.outputs.prerelease }}" = "true" ]; then
            PRE="--prerelease=true"
          else
            PRE="--prerelease=false"
          fi
          FILES="net-dhcp-plugin-${TAG}-linux-amd64.tar.gz sbom.spdx.json sbom.cdx.json checksums.txt checksums.txt.sig checksums.txt.pem"
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            # Re-dispatch of an existing tag: refresh assets + metadata.
            # shellcheck disable=SC2086
            gh release upload "$TAG" $FILES --repo "$GITHUB_REPOSITORY" --clobber
            # shellcheck disable=SC2086
            gh release edit "$TAG" --repo "$GITHUB_REPOSITORY" --notes-file notes.md $PRE
          else
            # shellcheck disable=SC2086
            gh release create "$TAG" $FILES \
              --repo "$GITHUB_REPOSITORY" \
              --title "$TAG" \
              --notes-file notes.md \
              --verify-tag $PRE
          fi
          echo "GitHub Release $TAG published with signed artifacts." >> "$GITHUB_STEP_SUMMARY"
