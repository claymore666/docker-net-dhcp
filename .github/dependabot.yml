# Weekly grouped dependency updates (#127). PRs target dev per the
# branching workflow — nothing lands on main except via release PRs.
# Grouping keeps the noise at one PR per ecosystem per week.
version: 2
updates:
  - package-ecosystem: gomod
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: sunday
    groups:
      go-deps:
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    target-branch: dev
    schedule:
      interval: weekly
      day: sunday
    groups:
      actions:
        patterns:
          - "*"
    ignore:
      # Hold actions/download-artifact at v7 until actions/upload-artifact
      # ships a v8. download-artifact v8 defaults a download digest
      # mismatch to a hard failure, and pairing upload v7 (its current
      # latest) with download v8 mixes majors on the release artifacts.
      # Remove this once upload-artifact v8 exists so both bump together.
      - dependency-name: "actions/download-artifact"
        versions: [">= 8"]

  # Keep the SHA-pinned base-image digests fresh (#159). One entry per
  # Dockerfile directory: the plugin build at the root and the CI
  # runner image under ci/runner-image.
  - package-ecosystem: docker
    directories:
      - /
      - /ci/runner-image
    target-branch: dev
    schedule:
      interval: weekly
      day: sunday
    groups:
      docker:
        patterns:
          - "*"
